name: Deploy AWS RDS PostgreSQL

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target under testing/aws/deploy"
        required: true
        type: choice
        options:
          - all
          - pg15
          - pg16
          - pg17
          - pg18
        default: all
      command:
        description: "OpenTofu command"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read

jobs:
  resolve:
    if: |
      (
        github.event_name == 'workflow_dispatch' &&
        github.actor == vars.DEPLOY_TRIGGER_USER
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        startsWith(github.event.comment.body, '/deploy-aws-rds') &&
        github.event.comment.user.login == vars.DEPLOY_TRIGGER_USER &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    name: Resolve deploy arguments
    runs-on: ubuntu-latest

    outputs:
      command: ${{ steps.args.outputs.command }}
      versions_json: ${{ steps.args.outputs.versions_json }}
      checkout_ref: ${{ steps.pr.outputs.head_sha || github.sha }}

    steps:
      - name: Validate trigger user is configured
        run: |
          if [ -z "${{ vars.DEPLOY_TRIGGER_USER }}" ]; then
            echo "::error::Repository variable DEPLOY_TRIGGER_USER is not set."
            exit 1
          fi

      - name: Resolve deploy arguments
        id: args
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ inputs.target }}"
            command="${{ inputs.command }}"
          else
            comment="${{ github.event.comment.body }}"
            read -r trigger arg1 arg2 _ <<<"${comment}"

            if [ "${trigger}" != "/deploy-aws-rds" ]; then
              echo "::error::Comment must start with '/deploy-aws-rds'"
              exit 1
            fi

            if [ -z "${arg1}" ]; then
              target="all"
              command="plan"
            elif [ "${arg1}" = "plan" ] || [ "${arg1}" = "apply" ] || [ "${arg1}" = "destroy" ]; then
              target="all"
              command="${arg1}"
            else
              target="${arg1}"
              if [ -z "${arg2}" ]; then
                command="plan"
              else
                command="${arg2}"
              fi
            fi
          fi

          case "${target}" in
            all|pg15|pg16|pg17|pg18) ;;
            *)
              echo "::error::Invalid target: ${target}"
              exit 1
              ;;
          esac

          case "${command}" in
            plan|apply|destroy) ;;
            *)
              echo "::error::Invalid command: ${command}"
              exit 1
              ;;
          esac

          if [ "${target}" = "all" ]; then
            versions_json='["pg15","pg16","pg17","pg18"]'
          else
            versions_json="[\"${target}\"]"
          fi

          echo "target=${target}" >> "$GITHUB_OUTPUT"
          echo "command=${command}" >> "$GITHUB_OUTPUT"
          echo "versions_json=${versions_json}" >> "$GITHUB_OUTPUT"

      - name: Resolve pull request head
        id: pr
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const pull_number = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number,
            });

            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('is_fork', String(pr.head.repo.fork));

      - name: Block fork pull requests
        if: github.event_name == 'issue_comment' && steps.pr.outputs.is_fork == 'true'
        run: |
          echo "::error::Comment-triggered deploy is blocked for fork PRs."
          exit 1

      - name: Show resolved inputs
        run: |
          echo "Target: ${{ steps.args.outputs.target }}"
          echo "Versions: ${{ steps.args.outputs.versions_json }}"
          echo "Command: ${{ steps.args.outputs.command }}"

  deploy:
    name: ${{ needs.resolve.outputs.command }} ${{ matrix.postgres_version }}
    runs-on: ubuntu-latest
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        postgres_version: ${{ fromJSON(needs.resolve.outputs.versions_json) }}

    env:
      AWS_REGION: us-west-2

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest

      - name: Resolve OpenTofu variables
        env:
          AWS_ALLOWED_CIDR_BLOCK: ${{ secrets.AWS_ALLOWED_CIDR_BLOCK }}
          AWS_DB_PASSWORD: ${{ secrets.AWS_DB_PASSWORD }}
        run: |
          if [ -z "$AWS_ALLOWED_CIDR_BLOCK" ]; then
            echo "::error::Missing secret AWS_ALLOWED_CIDR_BLOCK"
            exit 1
          fi

          if [ -z "$AWS_DB_PASSWORD" ]; then
            echo "::error::Missing secret AWS_DB_PASSWORD"
            exit 1
          fi

          echo "::add-mask::$AWS_DB_PASSWORD"
          echo "TF_VAR_allowed_cidr_block=$AWS_ALLOWED_CIDR_BLOCK" >> "$GITHUB_ENV"
          echo "TF_VAR_db_password=$AWS_DB_PASSWORD" >> "$GITHUB_ENV"

      - name: OpenTofu init
        working-directory: testing/aws/deploy/${{ matrix.postgres_version }}
        run: tofu init -input=false

      - name: OpenTofu validate
        working-directory: testing/aws/deploy/${{ matrix.postgres_version }}
        run: tofu validate

      - name: OpenTofu plan
        if: needs.resolve.outputs.command == 'plan' || needs.resolve.outputs.command == 'apply'
        working-directory: testing/aws/deploy/${{ matrix.postgres_version }}
        run: tofu plan -input=false

      - name: OpenTofu apply
        if: needs.resolve.outputs.command == 'apply'
        working-directory: testing/aws/deploy/${{ matrix.postgres_version }}
        run: tofu apply -auto-approve -input=false

      - name: OpenTofu destroy
        if: needs.resolve.outputs.command == 'destroy'
        working-directory: testing/aws/deploy/${{ matrix.postgres_version }}
        run: tofu destroy -auto-approve -input=false

      - name: Show endpoint output
        if: needs.resolve.outputs.command == 'apply'
        working-directory: testing/aws/deploy/${{ matrix.postgres_version }}
        run: |
          endpoint="$(tofu output -raw endpoint)"
          {
            echo "### Deployment Output"
            echo
            echo "- Version: ${{ matrix.postgres_version }}"
            echo "- Endpoint: ${endpoint}"
          } >> "$GITHUB_STEP_SUMMARY"

  validate:
    if: needs.resolve.outputs.command == 'apply'
    name: validate ${{ matrix.postgres_version }}
    needs: [resolve, deploy]
    strategy:
      fail-fast: false
      matrix:
        postgres_version: ${{ fromJSON(needs.resolve.outputs.versions_json) }}
    uses: ./.github/workflows/managed-db-validate.yml
    with:
      cloud_provider: aws
      aws_region: us-west-2
      aws_db_identifier: ${{ matrix.postgres_version }}
      pg_port: "5432"
      pg_user: randoneering
      pg_database: pgFirstAid
      pg_sslmode: require
      test_view_mode: managed
    secrets:
      pg_password: ${{ secrets.AWS_DB_PASSWORD }}
      aws_access_key_id: ${{ secrets.AWS_ACCESS_KEY_ID }}
      aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
