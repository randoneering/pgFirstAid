name: Deploy GCP Cloud SQL PostgreSQL

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Deploy target under testing/gcp/deploy"
        required: true
        type: choice
        options:
          - all
          - pg15
          - pg16
          - pg17
          - pg18
        default: all
      command:
        description: "OpenTofu command"
        required: true
        type: choice
        options:
          - plan
          - apply
          - destroy
        default: plan
      personal_ip_cidr:
        description: "Your CIDR for Cloud SQL access (optional). Leave blank to use secret DEPLOY_PERSONAL_IP_CIDR"
        required: false
        type: string
        default: ""
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read

jobs:
  resolve:
    if: |
      (
        github.event_name == 'workflow_dispatch' &&
        github.actor == vars.DEPLOY_TRIGGER_USER
      ) ||
      (
        github.event_name == 'issue_comment' &&
        github.event.issue.pull_request != null &&
        startsWith(github.event.comment.body, '/deploy-gcp-pg') &&
        github.event.comment.user.login == vars.DEPLOY_TRIGGER_USER &&
        (
          github.event.comment.author_association == 'OWNER' ||
          github.event.comment.author_association == 'MEMBER' ||
          github.event.comment.author_association == 'COLLABORATOR'
        )
      )
    name: Resolve deploy arguments
    runs-on: ubuntu-latest

    outputs:
      command: ${{ steps.args.outputs.command }}
      versions_json: ${{ steps.args.outputs.versions_json }}
      runner_ip_cidr: ${{ steps.args.outputs.runner_ip_cidr }}
      personal_ip_cidr: ${{ steps.args.outputs.personal_ip_cidr }}
      checkout_ref: ${{ steps.pr.outputs.head_sha || github.sha }}

    steps:
      - name: Validate trigger user is configured
        run: |
          if [ -z "${{ vars.DEPLOY_TRIGGER_USER }}" ]; then
            echo "::error::Repository variable DEPLOY_TRIGGER_USER is not set."
            exit 1
          fi

      - name: Resolve deploy arguments
        id: args
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            target="${{ inputs.target }}"
            command="${{ inputs.command }}"
            personal_ip_input="${{ inputs.personal_ip_cidr }}"
          else
            comment="${{ github.event.comment.body }}"
            read -r trigger arg1 arg2 _ <<<"${comment}"

            if [ "${trigger}" != "/deploy-gcp-pg" ]; then
              echo "::error::Comment must start with '/deploy-gcp-pg'"
              exit 1
            fi

            if [ -z "${arg1}" ]; then
              target="all"
              command="plan"
            elif [ "${arg1}" = "plan" ] || [ "${arg1}" = "apply" ] || [ "${arg1}" = "destroy" ]; then
              target="all"
              command="${arg1}"
            else
              target="${arg1}"
              if [ -z "${arg2}" ]; then
                command="plan"
              else
                command="${arg2}"
              fi
            fi

            personal_ip_input=""
          fi

          case "${target}" in
            all|pg15|pg16|pg17|pg18) ;;
            *)
              echo "::error::Invalid target: ${target}"
              exit 1
              ;;
          esac

          case "${command}" in
            plan|apply|destroy) ;;
            *)
              echo "::error::Invalid command: ${command}"
              exit 1
              ;;
          esac

          if [ "${target}" = "all" ]; then
            versions_json='["pg15","pg16","pg17","pg18"]'
          else
            versions_json="[\"${target}\"]"
          fi

          runner_ip="$(curl -fsSL https://checkip.amazonaws.com | tr -d '\n')"
          runner_ip_cidr="${runner_ip}/32"

          if [ -n "${personal_ip_input}" ]; then
            personal_ip_cidr="${personal_ip_input}"
          elif [ -n "${{ secrets.DEPLOY_PERSONAL_IP_CIDR }}" ]; then
            personal_ip_cidr="${{ secrets.DEPLOY_PERSONAL_IP_CIDR }}"
          else
            echo "::error::Set input personal_ip_cidr or repository secret DEPLOY_PERSONAL_IP_CIDR"
            exit 1
          fi

          echo "target=${target}" >> "$GITHUB_OUTPUT"
          echo "command=${command}" >> "$GITHUB_OUTPUT"
          echo "versions_json=${versions_json}" >> "$GITHUB_OUTPUT"
          echo "runner_ip_cidr=${runner_ip_cidr}" >> "$GITHUB_OUTPUT"
          echo "personal_ip_cidr=${personal_ip_cidr}" >> "$GITHUB_OUTPUT"

      - name: Resolve pull request head
        id: pr
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@v7
        with:
          script: |
            const pull_number = context.payload.issue.number;
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number,
            });

            core.setOutput('head_sha', pr.head.sha);
            core.setOutput('is_fork', String(pr.head.repo.fork));

      - name: Block fork pull requests
        if: github.event_name == 'issue_comment' && steps.pr.outputs.is_fork == 'true'
        run: |
          echo "::error::Comment-triggered deploy is blocked for fork PRs."
          exit 1

      - name: Show resolved inputs
        run: |
          echo "Target: ${{ steps.args.outputs.target }}"
          echo "Versions: ${{ steps.args.outputs.versions_json }}"
          echo "Command: ${{ steps.args.outputs.command }}"
          echo "Runner IP CIDR: ${{ steps.args.outputs.runner_ip_cidr }}"

  deploy:
    name: ${{ needs.resolve.outputs.command }} ${{ matrix.postgres_version }}
    runs-on: ubuntu-latest
    needs: resolve
    strategy:
      fail-fast: false
      matrix:
        postgres_version: ${{ fromJSON(needs.resolve.outputs.versions_json) }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.resolve.outputs.checkout_ref }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
          create_credentials_file: true
          export_environment_variables: true

      - name: Setup OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: latest

      - name: OpenTofu init
        working-directory: testing/gcp/deploy/${{ matrix.postgres_version }}
        run: tofu init -input=false

      - name: Write CI tfvars
        working-directory: testing/gcp/deploy/${{ matrix.postgres_version }}
        run: |
          cat > ci.auto.tfvars <<EOF
          authorized_networks = [
            { name = "allow-runner", value = "${{ needs.resolve.outputs.runner_ip_cidr }}" },
            { name = "allow-personal", value = "${{ needs.resolve.outputs.personal_ip_cidr }}" }
          ]
          EOF

      - name: OpenTofu validate
        working-directory: testing/gcp/deploy/${{ matrix.postgres_version }}
        run: tofu validate

      - name: OpenTofu plan
        if: needs.resolve.outputs.command == 'plan' || needs.resolve.outputs.command == 'apply'
        working-directory: testing/gcp/deploy/${{ matrix.postgres_version }}
        run: tofu plan -input=false

      - name: OpenTofu apply
        if: needs.resolve.outputs.command == 'apply'
        working-directory: testing/gcp/deploy/${{ matrix.postgres_version }}
        run: tofu apply -auto-approve -input=false

      - name: OpenTofu destroy
        if: needs.resolve.outputs.command == 'destroy'
        working-directory: testing/gcp/deploy/${{ matrix.postgres_version }}
        run: tofu destroy -auto-approve -input=false

      - name: Show instance outputs
        if: needs.resolve.outputs.command == 'apply'
        working-directory: testing/gcp/deploy/${{ matrix.postgres_version }}
        run: |
          instance_name="$(tofu output -raw instance_name)"
          public_ip_address="$(tofu output -raw public_ip_address)"
          {
            echo "### Deployment Output"
            echo
            echo "- Version: ${{ matrix.postgres_version }}"
            echo "- Instance: ${instance_name}"
            echo "- Public IP: ${public_ip_address}"
          } >> "$GITHUB_STEP_SUMMARY"
